<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JJ’s Moveset Editor</title>
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<style>
  body { margin:0; display:flex; height:100vh; }
  #toolbox { width:200px; background:#eee; overflow:auto; }
  #blocklyDiv { flex:1; }
  #output { width:100%; height:150px; }
  button { margin:5px; }
</style>
</head>
<body>

<div id="toolbox"></div>
<div id="blocklyDiv"></div>
<div style="position:absolute; bottom:0; left:0; right:0; background:#ccc;">
  <button id="exportBtn">Export JSON</button>
  <button id="importBtn">Import JSON</button>
  <textarea id="output"></textarea>
</div>

<script=script.js</script>
</body>
</html>
